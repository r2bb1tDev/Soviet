<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Медведь с конвертиком — для трея при новых сообщениях -->
  <!-- Уши -->
  <circle cx="28" cy="28" r="14" fill="#F0F0F0" stroke="#D8D8D8" stroke-width="1.5"/>
  <circle cx="72" cy="28" r="14" fill="#F0F0F0" stroke="#D8D8D8" stroke-width="1.5"/>
  <circle cx="28" cy="28" r="9" fill="#E0E0E0"/>
  <circle cx="72" cy="28" r="9" fill="#E0E0E0"/>
  <!-- Голова -->
  <ellipse cx="50" cy="56" rx="32" ry="30" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Морда -->
  <ellipse cx="50" cy="67" rx="14" ry="10" fill="#EEEEEE"/>
  <!-- Нос -->
  <ellipse cx="50" cy="62" rx="6" ry="4" fill="#333333"/>
  <!-- Глаза — приподняты (смотрит на конверт) -->
  <circle cx="37" cy="50" r="4.5" fill="#222222"/>
  <circle cx="63" cy="50" r="4.5" fill="#222222"/>
  <circle cx="38.5" cy="48.5" r="1.5" fill="white"/>
  <circle cx="64.5" cy="48.5" r="1.5" fill="white"/>
  <!-- Рот — улыбка -->
  <path d="M 44 68 Q 50 75 56 68" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Конверт (правый нижний угол) -->
  <rect x="60" y="62" width="36" height="26" rx="4" fill="#CC3333" stroke="white" stroke-width="2"/>
  <!-- Клапан конверта -->
  <path d="M 60 62 L 78 76 L 96 62" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Линии конверта -->
  <path d="M 60 88 L 72 77" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <path d="M 96 88 L 84 77" stroke="white" stroke-width="1.5" opacity="0.6"/>
</svg>
