name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: ubuntu-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf pkg-config \
            libglib2.0-dev libgdk-pixbuf2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Soviet v__VERSION__'
          releaseBody: |
            ## 🐻 Soviet v__VERSION__

            ### Скачать / Download

            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `Soviet_*_x64-setup.exe` |
            | 🍎 macOS Apple Silicon | `Soviet_*_aarch64.dmg` |
            | 🍎 macOS Intel | `Soviet_*_x64.dmg` |
            | 🐧 Linux | `Soviet_*_amd64.deb` / `.AppImage` |

            > Уже установлен? Обновление придёт автоматически в приложении.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
