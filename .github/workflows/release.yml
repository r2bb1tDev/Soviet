name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: ubuntu-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Linux: системные зависимости ─────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf pkg-config \
            libglib2.0-dev libgdk-pixbuf2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libayatana-appindicator3-dev \
            perl

      # ── Windows: Strawberry Perl уже предустановлен на windows-latest ─────────
      # Просто добавляем в PATH — shogo82148 action не нужен
      - name: Add Strawberry Perl to PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo "C:/Strawberry/perl/bin" >> $GITHUB_PATH

      # ── Windows: импорт сертификата подписи ─────────────────────────────────
      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = "$env:TEMP\soviet_signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          Import-PfxCertificate -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          Remove-Item $certPath
          $thumb = (Get-ChildItem Cert:\CurrentUser\My | Sort-Object NotAfter -Descending | Select-Object -First 1).Thumbprint
          echo "WINDOWS_CERT_THUMBPRINT=$thumb" >> $env:GITHUB_ENV

      # ── macOS: импорт сертификата (только если настроен) ───────────────────────
      # Секреты передаём через env-переменные шага (безопасно), а не через
      # ${{ secrets.* }} inline в run-скрипте. Проверку наличия сертификата
      # делаем в shell, а не в if-условии (secrets.* в if нестабилен).
      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          _CERT_B64:   ${{ secrets.APPLE_CERTIFICATE }}
          _CERT_PASS:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _KC_PASS:    ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          _SIGN_ID:    ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID:   ${{ secrets.APPLE_ID }}
          _APPLE_PASS: ${{ secrets.APPLE_PASSWORD }}
          _TEAM_ID:    ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$_CERT_B64" ]; then
            echo "Apple certificate not configured — skipping macOS signing"
            exit 0
          fi
          security create-keychain -p "$_KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$_KC_PASS" build.keychain
          echo "$_CERT_B64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$_CERT_PASS" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$_KC_PASS" build.keychain
          rm /tmp/certificate.p12
          echo "APPLE_SIGNING_IDENTITY=$_SIGN_ID" >> $GITHUB_ENV
          echo "APPLE_ID=$_APPLE_ID"              >> $GITHUB_ENV
          echo "APPLE_PASSWORD=$_APPLE_PASS"      >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=$_TEAM_ID"          >> $GITHUB_ENV

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # ── Проверка что updater-secret реально задан ───────────────────────────
      # Без него tauri-action молча НЕ создаёт .sig файлы и latest.json —
      # updater перестаёт работать у всех пользователей. Падаем явно.
      - name: Verify updater signing secret is set
        shell: bash
        env:
          _KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is EMPTY. Updater .sig files and latest.json will NOT be generated. Add the secret in repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY present, length=${#_KEY}"

      # ── Сборка и релиз ───────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN:                      ${{ secrets.GITHUB_TOKEN }}
          # Подпись обновлений (updater)
          TAURI_SIGNING_PRIVATE_KEY:         ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Пароль для подписи: явно пустая строка. Ключ сгенерирован БЕЗ пароля;
          # если secret отсутствует — GitHub подставит "", что tauri-cli трактует
          # как «ключ без пароля» и подписание проходит. Без явного объявления env
          # tauri-action ломался на интерактивном prompt.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # Windows: подпись бинаря (через signtool)
          TAURI_SIGN_WITH_THUMBPRINT:        ${{ env.WINDOWS_CERT_THUMBPRINT }}
          # macOS: APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # НЕ задаём здесь — они попадают в окружение через $GITHUB_ENV в шаге выше,
          # только если APPLE_CERTIFICATE secret задан. Это предотвращает передачу
          # пустой строки "" в codesign, что вызывало "item could not be found in keychain".
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Soviet v__VERSION__'
          releaseBody: |
            ## 🐻 Soviet v__VERSION__

            ### Скачать / Download

            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `Soviet_*_x64-setup.exe` |
            | 🍎 macOS Apple Silicon | `Soviet_*_aarch64.dmg` |
            | 🍎 macOS Intel | `Soviet_*_x64.dmg` |
            | 🐧 Linux | `Soviet_*_amd64.deb` / `.AppImage` |

            > Уже установлен? Обновление придёт автоматически в приложении.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

      # ── Диагностика: показать ВСЕ артефакты что tauri-action собрал ───────────
      # Помогает отловить случай когда .sig файлы создаются но не загружаются.
      - name: Diagnose — list bundle artifacts
        if: always()
        shell: bash
        run: |
          echo "=== Bundle directory contents ==="
          find src-tauri/target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz" -o -name "*.sig" -o -name "latest.json" \) 2>/dev/null | sort || true
          echo ""
          echo "=== .sig files specifically ==="
          find src-tauri/target -name "*.sig" 2>/dev/null || echo "NONE FOUND"

      # ── Явный upload .sig файлов (страховка) ────────────────────────────────
      # tauri-action должен уже их загрузить, но если что-то пошло не так —
      # этот шаг догружает любые .sig + latest.json которые остались на диске.
      - name: Upload .sig files and latest.json to release (fallback)
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          FILES=$(find src-tauri/target -type f \( -name "*.sig" -o -name "latest.json" \) 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "No .sig or latest.json files found — skipping fallback upload"
            exit 0
          fi
          echo "Files to upload as fallback:"
          echo "$FILES"
          # Используем gh CLI который предустановлен на runners
          command -v gh >/dev/null 2>&1 || { echo "gh CLI missing"; exit 0; }
          for f in $FILES; do
            echo "Uploading $f to release $TAG..."
            gh release upload "$TAG" "$f" --clobber --repo "${{ github.repository }}" || echo "Upload of $f failed (may already exist)"
          done
