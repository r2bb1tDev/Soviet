name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf pkg-config \
            libglib2.0-dev libgdk-pixbuf2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: |
          npm cache clean --force
          npm ci

      # Проверяем наличие Apple сертификата и сохраняем флаг
      - name: Check Apple signing availability
        id: apple_check
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "has_cert=true" >> $GITHUB_OUTPUT
          else
            echo "has_cert=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}

      # Импортируем сертификат только если он задан
      - name: Import Apple Certificate
        if: matrix.platform == 'macos-latest' && steps.apple_check.outputs.has_cert == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_CERTIFICATE намеренно не передаётся — импорт делается вручную выше
          # Если сертификата нет — APPLE_SIGNING_IDENTITY будет пустым и Tauri пропустит подпись
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_check.outputs.has_cert == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Soviet v__VERSION__'
          releaseBody: |
            ## Soviet v__VERSION__

            ### Скачать / Download

            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `Soviet_*_x64-setup.exe` |
            | 🍎 macOS Apple Silicon | `Soviet_*_aarch64.dmg` |
            | 🍎 macOS Intel | `Soviet_*_x64.dmg` |
            | 🐧 Linux | `Soviet_*_amd64.deb` / `.AppImage` |

            Полный список изменений: [CHANGELOG.md](https://github.com/r2bb1tDev/Soviet/blob/main/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

      - name: Cleanup keychain
        if: matrix.platform == 'macos-latest' && steps.apple_check.outputs.has_cert == 'true'
        run: security delete-keychain "$KEYCHAIN_PATH"
