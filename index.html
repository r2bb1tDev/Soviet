<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/bear_icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soviet</title>
    <!-- Применяем тему СИНХРОННО до первого рендера.
         Приоритет: ?theme= URL-параметр (попаут) → localStorage → prefers-color-scheme -->
    <script>
      ;(function(){
        var p = new URLSearchParams(window.location.search).get('theme');
        var s = p || localStorage.getItem('soviet_theme');
        var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
