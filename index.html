<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/bear_icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soviet</title>
    <!-- Тема синхронно до первого рендера — нет белой вспышки -->
    <script>
      ;(function(){
        var s = localStorage.getItem('soviet_theme');
        var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.documentElement.style.background = dark ? '#0A0A0A' : '#F4FFF7';
        document.documentElement.style.color      = dark ? '#F4FFF7' : '#0A0A0A';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
